name: CM Pro Sync PNCP

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      data_final:
        description: 'Data final YYYYMMDD (opcional)'
        required: false
        default: ''

jobs:
  sync-pncp:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        modalidade: [6, 8, 1]
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Buscar e ingerir modalidade ${{ matrix.modalidade }}
        run: |
          DATA_FINAL=$(date +%Y%m%d)
          if [ -n "${{ github.event.inputs.data_final }}" ]; then
            DATA_FINAL="${{ github.event.inputs.data_final }}"
          fi

          echo "Buscando modalidade ${{ matrix.modalidade }} com dataFinal=$DATA_FINAL"

          PAGINA=1
          MAX_PAGINAS=20
          HAS_MORE=true
          TOTAL_PAGINAS_ESPERADO=0

          while [ "$HAS_MORE" = "true" ] && [ "$PAGINA" -le "$MAX_PAGINAS" ]; do
            echo "--- Pagina $PAGINA ---"

            TENTATIVA_204=1
            while true; do
              TMP_BODY=$(mktemp)
              CURL_EXIT=0
              HTTP_STATUS=$(curl --fail --silent --show-error \
                --retry 3 \
                --retry-delay 10 \
                --retry-all-errors \
                --connect-timeout 20 \
                --max-time 120 \
                -H "Accept: application/json" \
                -o "$TMP_BODY" \
                -w "%{http_code}" \
                "https://pncp.gov.br/api/consulta/v1/contratacoes/proposta?pagina=${PAGINA}&tamanhoPagina=50&dataFinal=${DATA_FINAL}&codigoModalidadeContratacao=${{ matrix.modalidade }}") || CURL_EXIT=$?

              if [ "$HTTP_STATUS" = "204" ]; then
                echo "Consulta PNCP retornou 204. modalidade=${{ matrix.modalidade }} pagina=${PAGINA} tentativa=${TENTATIVA_204} status_http=${HTTP_STATUS} total_paginas_esperado=${TOTAL_PAGINAS_ESPERADO}"
                rm -f "$TMP_BODY"

                if [ "$TOTAL_PAGINAS_ESPERADO" -gt 0 ] && [ "$PAGINA" -le "$TOTAL_PAGINAS_ESPERADO" ]; then
                  if [ "$TENTATIVA_204" -lt 4 ]; then
                    echo "204 inconsistente do PNCP; repetindo a mesma pagina."
                    TENTATIVA_204=$((TENTATIVA_204 + 1))
                    sleep 10
                    continue
                  fi

                  echo "PNCP retornou 204 inesperado na pagina ${PAGINA} da modalidade ${{ matrix.modalidade }}, mas ainda havia paginas restantes."
                  exit 1
                fi

                echo "PNCP retornou 204 sem paginas restantes esperadas. Encerrando loop."
                HAS_MORE=false
                break 2
              fi

              break
            done

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "Falha ao consultar PNCP. modalidade=${{ matrix.modalidade }} pagina=${PAGINA} tentativa=${TENTATIVA_204} resultado=erro exit_code=${CURL_EXIT} status_http=${HTTP_STATUS:-000}"
              if [ -f "$TMP_BODY" ]; then
                BODY_PREVIEW=$(head -c 200 "$TMP_BODY" | tr '\n' ' ')
                echo "Primeiros 200 caracteres da resposta de erro: $BODY_PREVIEW"
              fi
              rm -f "$TMP_BODY"
              exit "$CURL_EXIT"
            fi

            RESPONSE=$(cat "$TMP_BODY")
            rm -f "$TMP_BODY"

            echo "Consulta PNCP concluida. modalidade=${{ matrix.modalidade }} pagina=${PAGINA} tentativa=${TENTATIVA_204} resultado=sucesso status_http=${HTTP_STATUS}"
            echo "Primeiros 200 chars do PNCP: ${RESPONSE:0:200}"

            if ! echo "$RESPONSE" | python3 -c 'import sys,json; json.load(sys.stdin)' >/dev/null 2>&1; then
              echo "Resposta invalida do PNCP. modalidade=${{ matrix.modalidade }} pagina=${PAGINA} resultado=json_invalido status_http=${HTTP_STATUS}"
              echo "Primeiros 200 caracteres da resposta invalida: ${RESPONSE:0:200}"
              exit 1
            fi

            TOTAL=$(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d.get("data",[])))')
            echo "Itens recebidos na pagina $PAGINA: $TOTAL"

            if [ "$TOTAL" = "0" ]; then
              echo "Sem dados, encerrando loop."
              break
            fi

            INGEST=$(curl -s -X POST \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              -d "$(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get("data",[])))')" \
              "https://inteligencia-sooty.vercel.app/api/pncp/ingest")

            echo "Resultado ingest pagina $PAGINA: $INGEST"

            PAGINAS_RESTANTES=$(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("paginasRestantes", 0))')
            echo "Paginas restantes: $PAGINAS_RESTANTES"
            TOTAL_PAGINAS_ESPERADO=$((PAGINA + PAGINAS_RESTANTES))

            if [ "$PAGINAS_RESTANTES" = "0" ] || [ "$PAGINAS_RESTANTES" = "" ]; then
              HAS_MORE=false
            fi

            PAGINA=$((PAGINA + 1))
          done

          echo "Loop encerrado apos $((PAGINA - 1)) pagina(s)."

  recalcular-scores:
    runs-on: ubuntu-latest
    needs: sync-pncp
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Recalcular scores
        run: |
          RESULT=$(curl -s -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://inteligencia-sooty.vercel.app/api/pncp/scores")
          echo "Resultado scores: $RESULT"
