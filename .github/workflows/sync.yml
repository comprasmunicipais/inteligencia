name: CM Pro Sync PNCP

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      data_final:
        description: 'Data final YYYYMMDD (opcional)'
        required: false
        default: ''

jobs:
  sync-pncp:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        modalidade: [6, 8, 1]
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Buscar e ingerir modalidade ${{ matrix.modalidade }}
        run: |
          DATA_FINAL=$(date +%Y%m%d)
          if [ -n "${{ github.event.inputs.data_final }}" ]; then
            DATA_FINAL="${{ github.event.inputs.data_final }}"
          fi

          echo "Buscando modalidade ${{ matrix.modalidade }} com dataFinal=$DATA_FINAL"

          PAGINA=1
          MAX_PAGINAS=20
          HAS_MORE=true

          while [ "$HAS_MORE" = "true" ] && [ "$PAGINA" -le "$MAX_PAGINAS" ]; do
            echo "--- PÃ¡gina $PAGINA ---"

            RESPONSE=$(curl -s \
              -H "Accept: application/json" \
              "https://pncp.gov.br/api/consulta/v1/contratacoes/proposta?pagina=${PAGINA}&tamanhoPagina=50&dataFinal=${DATA_FINAL}&codigoModalidadeContratacao=${{ matrix.modalidade }}")

            echo "Primeiros 200 chars do PNCP: ${RESPONSE:0:200}"

            TOTAL=$(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d.get("data",[])))' 2>/dev/null || echo 0)
            echo "Itens recebidos na pÃ¡gina $PAGINA: $TOTAL"

            if [ "$TOTAL" = "0" ] || [ "$TOTAL" = "erro ao parsear" ]; then
              echo "Sem dados, encerrando loop."
              break
            fi

            INGEST=$(curl -s -X POST \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              -d "$(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get("data",[])))')" \
              "https://inteligencia-sooty.vercel.app/api/pncp/ingest")

            echo "Resultado ingest pÃ¡gina $PAGINA: $INGEST"

            PAGINAS_RESTANTES=$(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("paginasRestantes", 0))' 2>/dev/null || echo 0)
            echo "PÃ¡ginas restantes: $PAGINAS_RESTANTES"

            if [ "$PAGINAS_RESTANTES" = "0" ] || [ "$PAGINAS_RESTANTES" = "" ]; then
              HAS_MORE=false
            fi

            PAGINA=$((PAGINA + 1))
          done

          echo "Loop encerrado apÃ³s $((PAGINA - 1)) pÃ¡gina(s)."

  recalcular-scores:
    runs-on: ubuntu-latest
    needs: sync-pncp
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Recalcular scores
        run: |
          RESULT=$(curl -s -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://inteligencia-sooty.vercel.app/api/pncp/scores")
          echo "Resultado scores: $RESULT"
