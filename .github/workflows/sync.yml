name: CM Pro Sync PNCP

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      data_final:
        description: 'Data final YYYYMMDD (opcional)'
        required: false
        default: ''

jobs:
  sync-pncp:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        modalidade: [6, 8, 1]
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Buscar e ingerir modalidade ${{ matrix.modalidade }}
        run: |
          DATA_FINAL=$(date +%Y%m%d)
          if [ -n "${{ github.event.inputs.data_final }}" ]; then
            DATA_FINAL="${{ github.event.inputs.data_final }}"
          fi

          echo "Buscando modalidade ${{ matrix.modalidade }} com dataFinal=$DATA_FINAL"

          RESPONSE=$(curl -s \
            -H "Accept: application/json" \
            "https://pncp.gov.br/api/consulta/v1/contratacoes/proposta?pagina=1&tamanhoPagina=500&dataFinal=${DATA_FINAL}&codigoModalidadeContratacao=${{ matrix.modalidade }}")

          TOTAL=$(echo "$RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d.get("data",[])))' 2>/dev/null || echo "erro ao parsear")
          echo "Itens recebidos do PNCP: $TOTAL"

          INGEST=$(curl -s -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$RESPONSE" \
            "https://inteligencia-sooty.vercel.app/api/pncp/ingest")

          echo "Resultado ingest: $INGEST"

  recalcular-scores:
    runs-on: ubuntu-latest
    needs: sync-pncp
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Recalcular scores
        run: |
          RESULT=$(curl -s -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://inteligencia-sooty.vercel.app/api/pncp/scores")
          echo "Resultado scores: $RESULT"
