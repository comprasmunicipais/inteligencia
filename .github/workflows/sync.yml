name: CM Pro Sync

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync-pncp:
    runs-on: ubuntu-latest
    steps:
      - name: Sync PNCP
        run: |
          curl -f -X GET "https://inteligencia-sooty.vercel.app/api/pncp/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  scrape-fontes:
    runs-on: ubuntu-latest
    needs: sync-pncp
    steps:
      - name: Scrape fontes manuais
        run: |
          curl -f -X GET "https://inteligencia-sooty.vercel.app/api/pncp/scrape" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  recalcular-scores:
    runs-on: ubuntu-latest
    needs: scrape-fontes
    steps:
      - name: Recalcular scores
        run: |
          curl -f -X GET "https://inteligencia-sooty.vercel.app/api/pncp/scores" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
